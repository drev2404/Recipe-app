<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered recipe generator that turns your ingredients into personalized meals with diet, time, and cooking style options." />
  <meta name="keywords" content="AI recipe generator, what can I cook, meal planner, ingredient recipes, cooking app" />
  <title>What Can I Cook? | AI Recipe Generator</title>  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 850px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 { text-align: center; margin-bottom: 5px; }
    p { text-align: center; color: #666; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover { background: #218838; }

    .recipe {
      background: #f1f1f1;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    .loading {
      text-align: center;
      margin-top: 15px;
      color: #888;
    }
  </style></head>
<body><div class="container">
  <h1>🍳 What Can I Cook?</h1>
  <p>AI-powered recipes from ingredients you already have</p>  <input id="ingredients" placeholder="Enter ingredients (e.g. chicken, rice, garlic)" />  <div class="grid">
    <input id="servings" type="number" placeholder="Servings" />
    <input id="time" type="number" placeholder="Max cook time (mins)" />
  </div>  <div class="grid">
    <select id="diet">
      <option value="">Any Diet</option>
      <option value="high-protein">High Protein</option>
      <option value="keto">Keto</option>
      <option value="vegan">Vegan</option>
      <option value="low-carb">Low Carb</option>
    </select><select id="style">
  <option value="">Any Style</option>
  <option value="grilled">Grilled</option>
  <option value="fried">Fried</option>
  <option value="baked">Baked</option>
  <option value="air-fryer">Air Fryer</option>
</select>

  </div><button onclick="generateRecipes()">Generate Recipes</button>

  <div id="output"></div>
</div><script>
async function generateRecipes() {
  const ingredients = document.getElementById('ingredients').value;
  const servings = document.getElementById('servings').value;
  const time = document.getElementById('time').value;
  const diet = document.getElementById('diet').value;
  const style = document.getElementById('style').value;
  const output = document.getElementById('output');

  if (!ingredients) {
    output.innerHTML = "<p>Please enter ingredients.</p>";
    return;
  }

  output.innerHTML = "<div class='loading'>Generating AI recipes...</div>";

  try {
    const res = await fetch('/api/recipe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ingredients, servings, time, diet, style })
    });

    const data = await res.json();

    output.innerHTML = data.recipes.map(r => `
      <div class="recipe">
        🍽️ ${r.name}\n\n
        Servings: ${r.servings}\n
        Time: ${r.time}\n
        Diet: ${r.diet}\n
        Style: ${r.style}\n

        Ingredients:\n${r.ingredients}\n
        Instructions:\n${r.instructions}
      </div>
    `).join('');

  } catch (err) {
    output.innerHTML = "Error generating recipes. Make sure API is connected.";
  }
}
</script><!--
IMPORTANT SETUP NOTES:
You must create a backend endpoint for /api/recipe using Vercel or Netlify Functions.
This endpoint should call OpenAI API and return JSON like:
{
  recipes: [
    { name, servings, time, diet, style, ingredients, instructions }
  ]
}
--></body>
</html>
